name: Update Artifacts

on:
  workflow_dispatch:
    inputs:
      r8_url:
        description: "Download URL for r8 backend tarball"
        required: true
        type: string
      r16_url:
        description: "Download URL for r16 backend tarball"
        required: true
        type: string

jobs:
  update-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - name: Download artifact tarballs
        run: |
          curl -fL "${{ inputs.r8_url }}" -o r8.tar.gz
          curl -fL "${{ inputs.r16_url }}" -o r16.tar.gz
      - name: Update Artifacts.toml
        run: |
          julia scripts/update_artifacts.jl Artifacts.toml \
            "${{ inputs.r8_url }}" r8.tar.gz \
            "${{ inputs.r16_url }}" r16.tar.gz
      - name: Show resulting Artifacts.toml
        run: |
          git diff -- Artifacts.toml || true
          cat Artifacts.toml
